services:
  db:
    image: postgres:16-alpine
    container_name: sales-orbit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales_orbit
    ports:
      - "5433:5432"
    volumes:
      - ./backend/src/db/migrations.sql:/docker-entrypoint-initdb.d/01-migrations.sql:ro
      - sales_orbit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales_orbit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sales_orbit_data:
