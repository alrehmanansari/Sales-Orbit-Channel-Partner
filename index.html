/* ── Auth Context ─────────────────────────────────────── */
const AuthCtx = createContext(null)
function AuthProvider({children}) {
  const [currentUser,setCurrentUser] = useState(()=>stor.get('cp_currentUser'))
  const getUsers       = ()=>stor.get('cp_users')||[]
  const getSpecialists = ()=>getUsers().filter(u=>u.role===ROLE_SPECIALIST)
  const signup = ({name,company,email,role,assignedSpecialistId})=>{
    const users=getUsers()
    if(users.find(u=>u.email.toLowerCase()===email.toLowerCase())) return {error:'Email already registered.'}
    const user={id:genId(),name,company,email,role,assignedSpecialistId:assignedSpecialistId||null,createdAt:new Date().toISOString()}
    stor.set('cp_users',[...users,user]); return {user}
  }
  const login = email=>{
    const user=getUsers().find(u=>u.email.toLowerCase()===email.toLowerCase())
    return user?{user}:{error:'No account found with this email.'}
  }
  const confirmLogin = user=>{stor.set('cp_currentUser',user);setCurrentUser(user)}
  const logout = ()=>{stor.set('cp_currentUser',null);setCurrentUser(null)}
  return <AuthCtx.Provider value={{currentUser,signup,login,confirmLogin,logout,getSpecialists}}>{children}</AuthCtx.Provider>
}
const useAuth = ()=>useContext(AuthCtx)

/* ── Accounts Context ────────────────────────────────── */
const AccCtx = createContext(null)
function AccountsProvider({children}) {
  const [accounts,setAccounts] = useState(()=>stor.get('cp_accounts')||[])
  const save = list=>{stor.set('cp_accounts',list);setAccounts(list)}
  const addAccount = (data,user)=>{
    const initHistory = data.accountStage ? [{stage:data.accountStage,date:new Date().toISOString(),by:user.name}] : []
    const acc={id:genId(),partnerId:user.id,partnerName:user.name,partnerCompany:user.company,assignedSpecialistId:user.assignedSpecialistId||null,createdAt:new Date().toISOString(),stageHistory:initHistory,...data}
    save([...accounts,acc])
  }
  const updateAccount = (id,data,user)=>{
    save(accounts.map(a=>{
      if(a.id!==id) return a
      const updated={...a,...data,updatedAt:new Date().toISOString()}
      if(user && data.accountStage && data.accountStage!==a.accountStage) {
        updated.stageHistory=[...(a.stageHistory||[]),{stage:data.accountStage,date:new Date().toISOString(),by:user.name}]
      }
      return updated
    }))
  }
  const deleteAccount = id=>save(accounts.filter(a=>a.id!==id))
  return <AccCtx.Provider value={{accounts,addAccount,updateAccount,deleteAccount}}>{children}</AccCtx.Provider>
}
const useAccounts = ()=>useContext(AccCtx)

/* ── Notes Context ───────────────────────────────────── */
const NotesCtx = createContext(null)
function NotesProvider({children}) {
  const [notes,setNotes] = useState(()=>stor.get('cp_notes')||[])
  const save = list=>{stor.set('cp_notes',list);setNotes(list)}
  const addNote = (accountId,content,user)=>{
    const note={id:genId(),accountId,authorId:user.id,authorName:user.name,authorRole:user.role,content,createdAt:new Date().toISOString()}
    save([...notes,note])
  }
  const getNotes = accountId=>notes.filter(n=>n.accountId===accountId).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))
  return <NotesCtx.Provider value={{addNote,getNotes}}>{children}</NotesCtx.Provider>
}
const useNotes = ()=>useContext(NotesCtx)

function StageHistory({ history }) {
  if (!history || history.length === 0) return null
  return (
    <div style={{marginBottom:20}}>

          {history.map((h,i)=>{
            const s = STAGE_MAP[h.stage]||{bg:'rgba(0,0,0,0.05)',color:'#888'}
            const isLast = i===history.length-1
            return (
              <div key={i} style={{display:'flex',alignItems:'flex-start'}}>
                {/* step */}
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:110}}>
                  {/* dot */}
                  <div style={{width:26,height:26,borderRadius:'50%',background:s.bg,border:`2.5px solid ${s.color}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:isLast?`0 0 0 4px ${s.bg}`:undefined}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:s.color}}/>
                  </div>
                  {/* stage name */}
                  <div style={{marginTop:6,fontSize:11,fontWeight:700,color:s.color,textAlign:'center',lineHeight:1.2}}>{h.stage}</div>
                  {isLast&&<div style={{fontSize:8,fontWeight:700,background:s.bg,color:s.color,padding:'1px 6px',borderRadius:8,marginTop:3,textTransform:'uppercase',letterSpacing:.4}}>Current</div>}
                  {/* date + by */}
                  <div style={{marginTop:4,fontSize:9,color:'var(--text-tertiary)',textAlign:'center',lineHeight:1.4}}>
                    {fmtDate(h.date)}<br/>
                    <span style={{color:'var(--text-hint)'}}>{h.by.split(' ')[0]}</span>
                  </div>
                </div>
                {/* connector line */}
                {!isLast&&<div style={{width:32,height:2.5,background:`linear-gradient(90deg,${s.color},${(STAGE_MAP[history[i+1]?.stage]||{color:'#ccc'}).color})`,marginTop:12,flexShrink:0,borderRadius:2,opacity:.4}}/>}
              </div>
            )
          })}
        </div>
      </div>
    </div>
  )
}

/* ── Notes Section ───────────────────────────────────── */
function NotesSection({ accountId }) {
  const { addNote, getNotes } = useNotes()
  const { currentUser } = useAuth()
  const [text, setText] = useState('')
  const notes = getNotes(accountId)
  const submit = () => {
    if (!text.trim()) return
    addNote(accountId, text.trim(), currentUser)
    setText('')
  }
  const isSpec = r => r === ROLE_SPECIALIST
  return (
    <div>
      <div style={{fontSize:10,fontWeight:700,color:'var(--text-tertiary)',textTransform:'uppercase',letterSpacing:'1.2px',marginBottom:12}}>Activity Log & Notes</div>
      {/* Add note */}
      <div style={{marginBottom:16}}>
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Add an update or note…" style={{marginBottom:8,fontSize:12}}/>
        <button onClick={submit} disabled={!text.trim()}
          style={{padding:'6px 16px',borderRadius:20,border:'none',background:'linear-gradient(90deg,#4796E3,#9177C7)',color:'#fff',fontSize:12,fontWeight:600,cursor:text.trim()?'pointer':'not-allowed',opacity:text.trim()?1:.5,fontFamily:'var(--font)'}}>
          Post Note
        </button>
      </div>
      {/* Notes list */}
      {notes.length===0
        ? <div style={{textAlign:'center',padding:'20px 0',fontSize:12,color:'var(--text-tertiary)'}}>No notes yet. Be the first to add an update.</div>
        : <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {notes.map(n=>{
              const spec = isSpec(n.authorRole)
              return (
                <div key={n.id} style={{background:'var(--bg-tertiary)',border:'1px solid var(--border-color)',borderRadius:10,padding:'10px 14px',borderLeft:`3px solid ${spec?'var(--so-purple)':'var(--so-blue)'}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,flexWrap:'wrap',gap:4}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:22,height:22,borderRadius:'50%',background:spec?'var(--so-purple-soft)':'var(--so-blue-soft)',border:`1.5px solid ${spec?'var(--so-purple)':'var(--so-blue)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:spec?'var(--so-purple)':'var(--so-blue)',flexShrink:0}}>
                        {n.authorName.split(' ').map(x=>x[0]).join('').slice(0,2)}
                      </div>
                      <div>
                        <div style={{fontSize:12,fontWeight:600}}>{n.authorName}</div>
                        <div style={{fontSize:9,color:'var(--text-tertiary)',textTransform:'uppercase',letterSpacing:.5}}>{spec?'Specialist':'Partner'}</div>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:'var(--text-tertiary)',fontFamily:'var(--font-mono)'}}>{fmtDT(n.createdAt)}</div>
                  </div>
                  <div style={{fontSize:12,color:'var(--text-primary)',lineHeight:1.6}}>{n.content}</div>
                </div>
              )
            })}
          </div>
      }
    </div>
  )
}

/* ── Account Form Modal ──────────────────────────────── */
function AccountForm({ onClose, editAccount }) {
  const { addAccount, updateAccount } = useAccounts()
  const { currentUser } = useAuth()
  const [clientId,            setClientId]            = useState(editAccount?.clientId||'')
  const [registrationDate,    setRegistrationDate]    = useState(editAccount?.registrationDate||'')
  const [companyName,         setCompanyName]         = useState(editAccount?.companyName||'')
  const [registrationCountry, setRegistrationCountry] = useState(editAccount?.registrationCountry||'')
  const [directorName,        setDirectorName]        = useState(editAccount?.directorName||'')
  const [emailId,             setEmailId]             = useState(editAccount?.emailId||'')
  const [phone,               setPhone]               = useState(editAccount?.phone||'')
  const [website,             setWebsite]             = useState(editAccount?.website||'')
  const [businessType,        setBusinessType]        = useState(editAccount?.businessType||'')
  const [vertical,            setVertical]            = useState(editAccount?.vertical||'')
  const [natureOfBusiness,    setNatureOfBusiness]    = useState(editAccount?.natureOfBusiness||'')
  const [expectedMonthlyVolume,setExpectedMonthlyVolume]=useState(editAccount?.expectedMonthlyVolume||'')
  const [accountStage,        setAccountStage]        = useState(editAccount?.accountStage||'')
  const [vaStatus,            setVaStatus]            = useState(editAccount?.vaStatus||'')
  const [cardStatus,          setCardStatus]          = useState(editAccount?.cardStatus||'')
  const [kycAgent,            setKycAgent]            = useState(editAccount?.kycAgent||'')
  const [errs,                setErrs]                = useState({})
  const submit = () => {
    const e={}
    if(!clientId.trim()) e.clientId='Required'
    if(!companyName.trim()) e.companyName='Required'
    if(!registrationCountry) e.registrationCountry='Required'
    if(!accountStage) e.accountStage='Required'
    if(Object.keys(e).length) return setErrs(e)
    const data={clientId,registrationDate,companyName,registrationCountry,directorName,emailId,phone,website,businessType,vertical,natureOfBusiness,expectedMonthlyVolume,accountStage,vaStatus,cardStatus,kycAgent}
    if(editAccount) updateAccount(editAccount.id,data,currentUser)
    else addAccount(data,currentUser)
    onClose()
  }
  return (
    <div className="modal-wrap" style={{position:'fixed',inset:0,zIndex:1100,background:'rgba(0,0,0,0.55)',backdropFilter:'blur(10px)',display:'flex',alignItems:'center',justifyContent:'center',padding:20,animation:'fadeIn .18s ease'}}>
      <div className="modal-sheet" style={{background:'var(--bg-secondary)',border:'1px solid var(--border-strong-color)',borderRadius:20,width:'100%',maxWidth:840,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.18)',animation:'slideUp .22s cubic-bezier(.34,1.56,.64,1)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 24px',borderBottom:'0.5px solid var(--border-color)',position:'sticky',top:0,background:'var(--bg-secondary)',backdropFilter:'blur(8px)',zIndex:1}}>
          <div><h3 style={{margin:0,fontSize:15,fontWeight:600}}>{editAccount?'Edit Account':'Add New Account'}</h3><div style={{fontSize:11,color:'var(--text-tertiary)',marginTop:2}}>Fill in the client onboarding details</div></div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-tertiary)',fontSize:18,padding:'4px 8px',lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:24,display:'grid',gap:14}}>
          <div className="g3" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
            <FormGroup label="Client ID" required error={errs.clientId}><input value={clientId} onChange={e=>{setClientId(e.target.value);setErrs(p=>({...p,clientId:''}))}  } placeholder="e.g. CLT-001"/></FormGroup>
            <FormGroup label="Registration Date"><input type="date" value={registrationDate} onChange={e=>setRegistrationDate(e.target.value)}/></FormGroup>
            <FormGroup label="Registration Country" required error={errs.registrationCountry}><select value={registrationCountry} onChange={e=>{setRegistrationCountry(e.target.value);setErrs(p=>({...p,registrationCountry:''}))} }><option value="">Select…</option>{COUNTRIES.map(c=><option key={c} value={c}>{c}</option>)}</select></FormGroup>
          </div>
          <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <FormGroup label="Company Name" required error={errs.companyName}><input value={companyName} onChange={e=>{setCompanyName(e.target.value);setErrs(p=>({...p,companyName:''}))} } placeholder="Company Ltd."/></FormGroup>
            <FormGroup label="Director Name"><input value={directorName} onChange={e=>setDirectorName(e.target.value)} placeholder="Director's full name"/></FormGroup>
          </div>
          <div className="g3" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
            <FormGroup label="Email ID"><input type="email" value={emailId} onChange={e=>setEmailId(e.target.value)} placeholder="contact@company.com"/></FormGroup>
            <FormGroup label="Phone"><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+1 555 000 0000"/></FormGroup>
            <FormGroup label="Website"><input value={website} onChange={e=>setWebsite(e.target.value)} placeholder="www.company.com"/></FormGroup>
          </div>
          <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <FormGroup label="Business Type"><select value={businessType} onChange={e=>setBusinessType(e.target.value)}><option value="">Select…</option>{BUSINESS_TYPES.map(b=><option key={b} value={b}>{b}</option>)}</select></FormGroup>
            <FormGroup label="Vertical"><select value={vertical} onChange={e=>setVertical(e.target.value)}><option value="">Select…</option>{VERTICALS.map(v=><option key={v} value={v}>{v}</option>)}</select></FormGroup>
          </div>
          <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <FormGroup label="Nature of Business"><select value={natureOfBusiness} onChange={e=>setNatureOfBusiness(e.target.value)}><option value="">Select…</option>{NOB_LIST.map(n=><option key={n} value={n}>{n}</option>)}</select></FormGroup>
            <FormGroup label="Expected Monthly Volume"><input value={expectedMonthlyVolume} onChange={e=>setExpectedMonthlyVolume(e.target.value)} placeholder="e.g. $50,000"/></FormGroup>
          </div>
          <div style={{height:'0.5px',background:'var(--border-color)',margin:'2px 0'}}/>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text-tertiary)',textTransform:'uppercase',letterSpacing:'1.2px'}}>Status Fields</div>
          <div className="g3" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
            <FormGroup label="Account Stage" required error={errs.accountStage}><select value={accountStage} onChange={e=>{setAccountStage(e.target.value);setErrs(p=>({...p,accountStage:''}))} }><option value="">Select…</option>{ACCOUNT_STAGES.map(s=><option key={s} value={s}>{s}</option>)}</select></FormGroup>
            <FormGroup label="VA Status"><select value={vaStatus} onChange={e=>setVaStatus(e.target.value)}><option value="">Select…</option>{VA_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select></FormGroup>
            <FormGroup label="Card Status"><select value={cardStatus} onChange={e=>setCardStatus(e.target.value)}><option value="">Select…</option>{CARD_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select></FormGroup>
          </div>
          <div style={{height:'0.5px',background:'var(--border-color)',margin:'2px 0'}}/>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text-tertiary)',textTransform:'uppercase',letterSpacing:'1.2px'}}>KYC</div>
          <div style={{maxWidth:320}}>
            <FormGroup label="KYC Agent"><input value={kycAgent} onChange={e=>setKycAgent(e.target.value)} placeholder="Agent name…"/></FormGroup>
          </div>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',padding:'16px 24px',borderTop:'0.5px solid var(--border-color)',background:'var(--bg-tertiary)',borderRadius:'0 0 20px 20px'}}>
          <button onClick={onClose} style={{padding:'7px 18px',borderRadius:24,border:'1px solid var(--border-strong-color)',background:'var(--bg-tertiary)',color:'var(--text-secondary)',cursor:'pointer',fontSize:13,fontFamily:'var(--font)'}}>Cancel</button>
          <button onClick={submit} style={{padding:'7px 22px',borderRadius:24,border:'none',background:'linear-gradient(90deg,#4796E3,#9177C7,#CA6673)',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'var(--font)',boxShadow:'0 2px 10px rgba(71,150,227,.35)'}}>
            {editAccount?'Save Changes':'+ Add Account'}
          </button>
        </div>
      </div>
    </div>
  )
}

/* ── Accounts Page ───────────────────────────────────── */
function AccountsPage() {
  const {currentUser}=useAuth()
  const {accounts,deleteAccount}=useAccounts()
  const [search,setSearch]=useState('')
  const [fStage,setFStage]=useState('')
  const [fCountry,setFCountry]=useState('')
  const [fVertical,setFVertical]=useState('')
  const [showForm,setShowForm]=useState(false)
  const [editAcc,setEditAcc]=useState(null)
  const [selAcc,setSelAcc]=useState(null)
  const mine=useMemo(()=>{
    if(currentUser.role===ROLE_SPECIALIST) return accounts.filter(a=>a.assignedSpecialistId===currentUser.id)
    return accounts.filter(a=>a.partnerId===currentUser.id)
  },[accounts,currentUser])
  const filtered=useMemo(()=>mine.filter(a=>{
    if(fStage&&a.accountStage!==fStage) return false
    if(fCountry&&a.registrationCountry!==fCountry) return false
    if(fVertical&&a.vertical!==fVertical) return false
    if(search){const s=search.toLowerCase();return [a.companyName,a.clientId,a.directorName,a.emailId].some(v=>v?.toLowerCase().includes(s))}
    return true
  }),[mine,search,fStage,fCountry,fVertical])
  const hasF=search||fStage||fCountry||fVertical
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 24px',background:'var(--bg-secondary)',borderBottom:'0.5px solid var(--border-color)'}}>
        <div>
          <h2 style={{margin:0}}>Accounts</h2>
          <div style={{fontSize:12,color:'var(--text-tertiary)',marginTop:2}}>{mine.length} total · {currentUser.role===ROLE_SPECIALIST?'assigned to you':'your submissions'}</div>
        </div>
        {currentUser.role===ROLE_PARTNER&&<button onClick={()=>setShowForm(true)} style={{padding:'7px 18px',borderRadius:24,border:'none',background:'linear-gradient(90deg,#4796E3,#9177C7,#CA6673)',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'var(--font)',boxShadow:'0 2px 10px rgba(71,150,227,.35)'}}>+ Add Account</button>}
      </div>
      {/* Filters */}
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',padding:'8px 24px',background:'var(--bg-secondary)',borderBottom:'0.5px solid var(--border-color)'}}>
        <div style={{position:'relative',flex:1,minWidth:160,maxWidth:240}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text-tertiary)',pointerEvents:'none',fontSize:13}}>⌕</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{paddingLeft:30,borderRadius:24,fontSize:11,padding:'5px 10px 5px 30px'}}/>
        </div>
        {[{v:fStage,fn:setFStage,opts:ACCOUNT_STAGES,ph:'All Stages'},{v:fCountry,fn:setFCountry,opts:COUNTRIES,ph:'All Countries'},{v:fVertical,fn:setFVertical,opts:VERTICALS,ph:'All Verticals'}].map(({v,fn,opts,ph})=>(
          <select key={ph} value={v} onChange={e=>fn(e.target.value)} style={{width:'auto',minWidth:110,fontSize:11,padding:'5px 8px'}}>
            <option value="">{ph}</option>{opts.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        ))}
        {hasF&&<button onClick={()=>{setSearch('');setFStage('');setFCountry('');setFVertical('')}} style={{padding:'4px 12px',borderRadius:24,border:'1px solid var(--border-strong-color)',background:'var(--bg-tertiary)',color:'var(--text-secondary)',cursor:'pointer',fontSize:11,fontFamily:'var(--font)'}}>✕</button>}
      </div>
      {/* Table */}
      <div style={{flex:1,overflowY:'auto'}} className="page-anim">
        {filtered.length===0?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'60px 20px',color:'var(--text-tertiary)',textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:12,opacity:.3}}>🏢</div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text-secondary)',marginBottom:6}}>No accounts found</div>
            <div style={{fontSize:12}}>{hasF?'Try adjusting filters.':currentUser.role===ROLE_PARTNER?'Add your first account.':'No accounts assigned yet.'}</div>

          </div>

          <table className="dtbl">
            <thead>
              <tr>
                {['#','Client ID','Company','Country','Email','Phone','Biz Type','Vertical','NOB','Volume','KYC Agent','Stage','VA Status','Card Status','Reg. Date','Actions'].map(h=><th key={h}>{h}</th>)}
              </tr>
            </thead>
            <tbody>

                <tr key={acc.id} onClick={()=>setSelAcc(acc)}>
                  <td style={{fontSize:9,color:'var(--text-tertiary)',fontFamily:'var(--font-mono)',textAlign:'center',maxWidth:28}}>{idx+1}</td>

                  <td style={{maxWidth:80}}><Badge label={acc.businessType} map={BTYPE_MAP}/></td>
                  <td style={{fontSize:10,color:'var(--text-secondary)',maxWidth:80}} title={acc.vertical}>{acc.vertical||'—'}</td>

                  <td onClick={e=>e.stopPropagation()} style={{maxWidth:50}}>
                    {currentUser.role===ROLE_PARTNER&&currentUser.id===acc.partnerId&&(
                      <div style={{display:'flex',gap:2}}>
                        <button onClick={()=>setEditAcc(acc)} style={{padding:'2px 6px',borderRadius:5,border:'none',background:'transparent',color:'var(--text-tertiary)',cursor:'pointer',fontSize:10}} onMouseEnter={e=>{e.currentTarget.style.background='var(--so-blue-soft)';e.currentTarget.style.color='var(--so-blue)'}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--text-tertiary)'}}>✏</button>
                        <button onClick={()=>{if(confirm('Delete?'))deleteAccount(acc.id)}} style={{padding:'2px 6px',borderRadius:5,border:'none',background:'transparent',color:'var(--text-tertiary)',cursor:'pointer',fontSize:10}} onMouseEnter={e=>{e.currentTarget.style.background='rgba(217,48,37,.08)';e.currentTarget.style.color='#D93025'}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--text-tertiary)'}}>🗑</button>
                      </div>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
        <div style={{padding:'8px 24px',borderTop:'0.5px solid var(--border-color)',fontSize:11,color:'var(--text-tertiary)',background:'var(--bg-secondary)'}}>Showing {filtered.length} of {mine.length} accounts</div>
      </div>
      {showForm&&<AccountForm onClose={()=>setShowForm(false)}/>}
      {editAcc&&<AccountForm editAccount={editAcc} onClose={()=>setEditAcc(null)}/>}
      {selAcc&&<AccountDetail account={accounts.find(a=>a.id===selAcc.id)||selAcc} onClose={()=>setSelAcc(null)} onEdit={a=>{setEditAcc(a);setSelAcc(null)}} onDelete={deleteAccount} currentUser={currentUser}/>}
    </div>
  )
}

/* ── Dashboard ───────────────────────────────────────── */
function Dashboard({onNav}) {
  const {currentUser}=useAuth()
  const {accounts}=useAccounts()
  const mine=useMemo(()=>currentUser.role===ROLE_SPECIALIST?accounts.filter(a=>a.assignedSpecialistId===currentUser.id):accounts.filter(a=>a.partnerId===currentUser.id),[accounts,currentUser])
  const s=useMemo(()=>({
    total:mine.length,
    registered:mine.filter(a=>a.accountStage==='Registered').length,
    inReview:mine.filter(a=>a.accountStage==='In Review').length,
    onboarded:mine.filter(a=>a.accountStage==='Onboarded').length,
    activated:mine.filter(a=>a.accountStage==='Activated').length,
    blocked:mine.filter(a=>a.accountStage==='Blocked').length,
  }),[mine])
  const chartMonths = useMemo(()=>{
    const now = new Date()
    return Array.from({length:6},(_,i)=>{
      const d = new Date(now.getFullYear(), now.getMonth()-5+i, 1)
      return { key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`, label:d.toLocaleString('en-US',{month:'short'}) }
    })
  },[])
  const regData = useMemo(()=>{
    const map = Object.fromEntries(chartMonths.map(m=>[m.key,0]))
    mine.forEach(a=>{ if(a.registrationDate){ const k=a.registrationDate.slice(0,7); if(k in map) map[k]++ } })
    return chartMonths.map(m=>({label:m.label,value:map[m.key]}))
  },[mine,chartMonths])
  const actData = useMemo(()=>{
    const map = Object.fromEntries(chartMonths.map(m=>[m.key,0]))
    mine.forEach(a=>{ const entry=(a.stageHistory||[]).find(h=>h.stage==='Activated'); if(entry){ const k=entry.date.slice(0,7); if(k in map) map[k]++ } })
    return chartMonths.map(m=>({label:m.label,value:map[m.key]}))
  },[mine,chartMonths])
  return (
    <div style={{flex:1,overflowY:'auto',padding:24}} className="page-anim">
      <div style={{marginBottom:22}}>
        <h2 style={{margin:0,fontSize:20}}>Welcome back, {currentUser.name.split(' ')[0]} 👋</h2>
        <div style={{fontSize:12,color:'var(--text-tertiary)',marginTop:4}}>{currentUser.company} · {currentUser.role}</div>
      </div>
      <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'1.4px',color:'var(--text-tertiary)',marginBottom:10}}>Key Metrics</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:26}}>
        <StatCard label="Total Accounts"  value={s.total}/>
        <StatCard label="Registered"      value={s.registered}  color="#4796E3"/>
        <StatCard label="In Review"       value={s.inReview}    color="#E37400"/>
        <StatCard label="Onboarded"       value={s.onboarded}   color="#1E8E3E"/>
        <StatCard label="Activated"       value={s.activated}   color="#CA6673"/>
        <StatCard label="Blocked"         value={s.blocked}     color="#D93025"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:26}}>
        <MonthBarChart title="Registration Trend" data={regData} color="#4796E3"/>
        <MonthBarChart title="Activated Clients"  data={actData} color="#CA6673"/>
      </div>
      {(()=>{
        const parseVol = v => v ? parseInt(v.replace(/[$,]/g,''),10)||0 : 0
        const monthsRemaining = reg => {
          if(!reg) return null
          const r = new Date(reg), now = new Date()
          const elapsed = (now.getFullYear()-r.getFullYear())*12+(now.getMonth()-r.getMonth())
          return Math.max(12-elapsed, 0)
        }
        const getActivationDate = a => {
          const e = (a.stageHistory||[]).find(h=>h.stage==='Activated')
          return e ? e.date : null
        }
        const rows = mine.filter(a=>parseVol(a.expectedMonthlyVolume)>5000)
        if(!rows.length) return (
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border-color)',borderRadius:14,padding:48,textAlign:'center',color:'var(--text-tertiary)'}}>
            <div style={{fontSize:36,marginBottom:12,opacity:.25}}>🏢</div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text-secondary)',marginBottom:6}}>No accounts above $5,000 monthly volume</div>
          </div>
        )
        return (
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border-color)',borderRadius:14,boxShadow:'var(--shadow-sm)',overflow:'hidden'}}>
            <div style={{padding:'14px 18px',borderBottom:'0.5px solid var(--border-color)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontWeight:600,fontSize:13}}>Account Overview</div>
              <button onClick={()=>onNav('accounts')} style={{background:'none',border:'none',color:'var(--so-blue)',cursor:'pointer',fontSize:12,fontFamily:'var(--font)',fontWeight:500}}>View all →</button>
            </div>
            <div style={{overflowX:'auto'}}>
              <table className="dtbl">
                <thead>
                  <tr>
                    <th>Client ID</th>
                    <th>Company Name</th>
                    <th>Account Status</th>
                    <th>Offer Duration</th>
                    <th>Registration Date</th>
                    <th>Activation Date</th>
                    <th>Months Remaining</th>
                    <th>Monthly Volume</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map(acc=>{
                    const mr = monthsRemaining(acc.registrationDate)
                    const actDate = getActivationDate(acc)
                    const mrColor = mr===null?'var(--text-tertiary)':mr<=2?'#D93025':mr<=5?'#E37400':'#1E8E3E'
                    return (
                      <tr key={acc.id}>
                        <td style={{fontFamily:'var(--font-mono)',color:'var(--so-blue)',fontWeight:600}}>{acc.clientId||'—'}</td>
                        <td style={{fontWeight:600,maxWidth:160}}>{acc.companyName}</td>
                        <td><Badge label={acc.accountStage} map={STAGE_MAP}/></td>
                        <td style={{color:'var(--text-secondary)'}}>12 Months</td>
                        <td style={{fontFamily:'var(--font-mono)',fontSize:11}}>{fmtDate(acc.registrationDate)}</td>
                        <td style={{fontFamily:'var(--font-mono)',fontSize:11}}>{actDate?fmtDate(actDate):'—'}</td>
                        <td><span style={{fontWeight:700,color:mrColor}}>{mr!==null?`${mr} mo`:'—'}</span></td>
                        <td style={{fontFamily:'var(--font-mono)',fontWeight:600,color:'var(--text-primary)'}}>{acc.expectedMonthlyVolume||'—'}</td>
                      </tr>
                    )
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )
      })()}
    </div>
  )
}

/* ── Sidebar ─────────────────────────────────────────── */
function Sidebar({page,onNav,onLogout,isMobile,isOpen}) {
  const {currentUser}=useAuth()
  const {accounts}=useAccounts()
  const count=useMemo(()=>currentUser.role===ROLE_SPECIALIST?accounts.filter(a=>a.assignedSpecialistId===currentUser.id).length:accounts.filter(a=>a.partnerId===currentUser.id).length,[accounts,currentUser])
  const base={width:'var(--sidebar-w)',flexShrink:0,background:'var(--bg-secondary)',borderRight:'0.5px solid var(--border-color)',display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}
  const mob={...base,position:'fixed',top:0,left:0,bottom:0,zIndex:201,width:260,transform:isOpen?'translateX(0)':'translateX(-100%)',transition:'transform .28s cubic-bezier(.4,0,.2,1)',boxShadow:isOpen?'8px 0 32px rgba(0,0,0,0.15)':'none'}
  const NAV=[{id:'dashboard',label:'Dashboard',icon:'▦'},{id:'accounts',label:'Accounts',icon:'◈',badge:count||null}]
  return (
    <aside style={isMobile?mob:base}>
      <div style={{padding:16,borderBottom:'0.5px solid var(--border-color)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <StarLogo size={34}/>
          <div>
            <div style={{fontWeight:700,fontSize:15,letterSpacing:'-.3px',lineHeight:1.2}}>
              <span style={{background:'linear-gradient(90deg,#4796E3,#9177C7)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>Partner </span>
              <span style={{background:'linear-gradient(90deg,#9177C7,#CA6673)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>Portal</span>
            </div>
            <div style={{fontSize:8,color:'var(--text-tertiary)',letterSpacing:'1.5px',textTransform:'uppercase',marginTop:1}}>by SalesOrbit</div>
          </div>
        </div>
      </div>
      <nav style={{flex:1,padding:'10px 8px',overflowY:'auto'}}>
        <div style={{fontSize:9,color:'var(--text-hint)',fontWeight:700,letterSpacing:'1.8px',textTransform:'uppercase',padding:'6px 12px 10px'}}>Main Menu</div>
        {NAV.map(item=>{
          const active=page===item.id
          return (
            <button key={item.id} onClick={()=>onNav(item.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'8px 12px',borderRadius:10,background:active?'linear-gradient(90deg,var(--so-blue-soft),rgba(145,119,199,0.06))':'transparent',border:'none',borderLeft:active?'2px solid var(--so-blue)':'2px solid transparent',color:active?'var(--so-blue)':'var(--text-secondary)',cursor:'pointer',fontSize:13,fontWeight:active?600:400,marginBottom:2,textAlign:'left',fontFamily:'var(--font)',transition:'all 180ms ease'}}
              onMouseEnter={e=>{if(!active){e.currentTarget.style.background='var(--bg-tertiary)';e.currentTarget.style.color='var(--text-primary)'}}}
              onMouseLeave={e=>{if(!active){e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--text-secondary)'}}}>
              <span style={{fontSize:14,width:20,textAlign:'center',flexShrink:0,opacity:active?1:0.7}}>{item.icon}</span>
              <span style={{flex:1}}>{item.label}</span>
              {item.badge&&<span style={{background:'linear-gradient(90deg,#4796E3,#9177C7,#CA6673)',color:'#fff',fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:10,minWidth:18,textAlign:'center'}}>{item.badge}</span>}
            </button>
          )
        })}
      </nav>
      {currentUser.role===ROLE_SPECIALIST&&<div style={{margin:'0 10px 10px',padding:'8px 10px',background:'rgba(145,119,199,0.08)',border:'1px solid rgba(145,119,199,0.2)',borderRadius:10,fontSize:11,color:'var(--so-purple)',fontWeight:500}}>🎯 Specialist View</div>}
      <div style={{padding:'12px 16px',borderTop:'0.5px solid var(--border-color)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:30,height:30,borderRadius:'50%',background:'var(--so-blue-soft)',border:'1.5px solid var(--so-blue)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,color:'var(--so-blue)',flexShrink:0}}>{currentUser.name?.split(' ').map(n=>n[0]).join('').slice(0,2)||'U'}</div>
          <div style={{overflow:'hidden',flex:1}}>
            <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{currentUser.name}</div>
            <div style={{fontSize:9,color:'var(--text-tertiary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{currentUser.role}</div>
          </div>
          <button onClick={onLogout} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-tertiary)',fontSize:14,padding:4,borderRadius:6,transition:'color .15s'}} onMouseEnter={e=>e.currentTarget.style.color='#D93025'} onMouseLeave={e=>e.currentTarget.style.color='var(--text-tertiary)'}>⏻</button>
        </div>
      </div>
    </aside>
  )
}

/* ── Header ──────────────────────────────────────────── */
function Header({page,theme,toggleTheme,isMobile,onMenuToggle}) {
  const {currentUser}=useAuth()
  return (
    <div style={{height:'var(--header-h)',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px',background:'var(--bg-secondary)',borderBottom:'0.5px solid var(--border-color)',flexShrink:0,position:'relative'}}>
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:'0.5px',background:'linear-gradient(90deg,var(--so-blue),var(--so-purple) 40%,transparent 80%)',opacity:.25}}/>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        {isMobile&&<button onClick={onMenuToggle} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-secondary)',fontSize:18,padding:4}}>☰</button>}
        <div style={{fontWeight:600,fontSize:15}}>{{dashboard:'Dashboard',accounts:'Accounts'}[page]||'Portal'}</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{fontSize:11,color:'var(--text-tertiary)',display:'flex',alignItems:'center',gap:6}}><span style={{width:6,height:6,borderRadius:'50%',background:'#1E8E3E',display:'inline-block'}}/>{currentUser?.company}</div>
        <button onClick={toggleTheme} style={{background:'var(--bg-tertiary)',border:'1px solid var(--border-strong-color)',borderRadius:8,padding:'5px 10px',cursor:'pointer',color:'var(--text-secondary)',fontSize:13,fontFamily:'var(--font)',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.background='var(--bg-hover)';e.currentTarget.style.color='var(--text-primary)'}} onMouseLeave={e=>{e.currentTarget.style.background='var(--bg-tertiary)';e.currentTarget.style.color='var(--text-secondary)'}}>
          {theme==='dark'?'☀':'◑'}
        </button>
      </div>
    </div>
  )
}

/* ── App Shell ───────────────────────────────────────── */
function AppContent() {
  const {currentUser,logout}=useAuth()
  const [page,setPage]=useState('dashboard')
  const [theme,setTheme]=useState(()=>localStorage.getItem('cp_theme')||'light')
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<768)
  const [sidebarOpen,setSidebarOpen]=useState(false)
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('cp_theme',theme)},[theme])
  useEffect(()=>{const fn=()=>setIsMobile(window.innerWidth<768);window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn)},[])
  if(!currentUser) return <AuthPage/>
  const navigate=id=>{setPage(id);if(isMobile)setSidebarOpen(false)}
  return (
    <div style={{display:'flex',height:'100dvh',overflow:'hidden'}}>
      {isMobile&&sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.5)',backdropFilter:'blur(2px)',animation:'fadeIn .18s ease'}}/>}
      <Sidebar page={page} onNav={navigate} onLogout={logout} isMobile={isMobile} isOpen={sidebarOpen}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        <Header page={page} theme={theme} toggleTheme={()=>setTheme(t=>t==='dark'?'light':'dark')} isMobile={isMobile} onMenuToggle={()=>setSidebarOpen(o=>!o)}/>
        <main style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {page==='accounts'?<AccountsPage/>:<Dashboard onNav={navigate}/>}
        </main>
      </div>
    </div>
  )
}

function App() {
  return (
    <AuthProvider>
      <AccountsProvider>
        <NotesProvider>
          <AppContent/>
        </NotesProvider>
      </AccountsProvider>
    </AuthProvider>
  )
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
