server {
    listen 80;
    listen [::]:80;
    server_name partner.salesorbit.tech;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name partner.salesorbit.tech;

    # ── SSL ─────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/partner.salesorbit.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/partner.salesorbit.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Frontend (static files) ──────────────────────────────────────
    root /var/www/sales-orbit/frontend;
    index index.html;

    # SPA-style – serve files directly, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # CORS headers (backend already sets these but double-up for safety)
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # File uploads proxy
    location /uploads/ {
        proxy_pass http://127.0.0.1:3002/uploads/;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3002/health;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
