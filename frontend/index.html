<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In · Sales Orbit</title>
<link rel="stylesheet" href="assets/css/design-system.css"/>
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-wrap{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-card{width:420px;max-width:100%;background:rgba(255,255,255,.6);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border:1px solid rgba(255,255,255,.65);border-radius:24px;box-shadow:0 32px 60px -20px rgba(31,38,135,.2),0 0 0 1px rgba(145,119,199,.08);overflow:hidden}
[data-theme=dark] .auth-card{background:rgba(20,20,22,.65);border:1px solid rgba(255,255,255,.08);box-shadow:0 32px 60px -8px rgba(0,0,0,.75),0 0 0 1px rgba(145,119,199,.2),0 0 60px -16px rgba(145,119,199,.4)}
.auth-logo-h{display:flex;align-items:center;gap:12px;padding:20px 28px;border-bottom:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.7);backdrop-filter:blur(20px)}
[data-theme=dark] .auth-logo-h{background:rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.1)}
.auth-brand-name{font-family:'Google Sans Display','DM Sans',sans-serif;font-size:28px;font-weight:500;letter-spacing:-.5px;background:linear-gradient(90deg,#4796E3,#9177C7,#CA6673);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.auth-body{padding:28px}
.auth-title{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.3px;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:24px}
.auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.auth-field label{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text2)}
.auth-input{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;background:rgba(255,255,255,.6);border:1px solid var(--border2);transition:all .2s}
[data-theme=dark] .auth-input{background:rgba(255,255,255,.05)}
.auth-input:focus-within{border-color:var(--g-purple);box-shadow:0 0 0 3px var(--g-purple-soft)}
.auth-input input{flex:1;border:none;outline:none;background:transparent;font-family:var(--font);font-size:14px;color:var(--text)}
.auth-input input::placeholder{color:var(--text3)}
.auth-input svg{flex-shrink:0;color:var(--text3)}
.auth-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;margin:6px 0 18px;color:var(--text2)}
.auth-row a{color:var(--g-purple);text-decoration:none;font-weight:500;cursor:pointer}
.auth-cta{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(90deg,var(--g-blue),var(--g-purple));color:#fff;font-family:var(--font);font-size:14px;font-weight:600;letter-spacing:.2px;cursor:pointer;box-shadow:0 8px 20px -6px rgba(145,119,199,.5);transition:transform .2s,opacity .2s}
.auth-cta:hover{transform:translateY(-1px)}
.auth-cta:active{transform:translateY(0);opacity:.9}
.auth-cta:disabled{opacity:.6;cursor:not-allowed;transform:none}
.auth-foot{text-align:center;font-size:12px;color:var(--text2);margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
.auth-foot a{color:var(--g-purple);text-decoration:none;font-weight:500}
.cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);background:var(--surface);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.cb.on{background:linear-gradient(135deg,var(--g-blue),var(--g-purple));border-color:transparent}
.cb.on::after{content:'';width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px)}
.error-msg{background:rgba(217,48,37,.1);color:#D93025;border:1px solid rgba(217,48,37,.2);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:14px;display:none}
.error-msg.show{display:block}
.theme-corner{position:fixed;top:16px;right:16px}
</style>
</head>
<body class="aurora-bg">
<span class="aurora-orb" style="width:260px;height:260px;background:#4796E3;top:-80px;left:-60px"></span>
<span class="aurora-orb" style="width:220px;height:220px;background:#9177C7;top:40%;right:-60px;animation-delay:-5s"></span>
<span class="aurora-orb" style="width:180px;height:180px;background:#CA6673;bottom:-60px;left:40%;animation-delay:-9s"></span>

<div class="theme-corner">
  <button class="theme-btn" onclick="Auth.toggleTheme()" title="Toggle theme" style="width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2)">
    <svg class="sun-icon" style="width:16px;height:16px;position:absolute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    <svg class="moon-icon" style="width:16px;height:16px;position:absolute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
  </button>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo-h">
      <svg width="36" height="36" viewBox="0 0 80 80" fill="none">
        <defs><linearGradient id="lg" x1="40" y1="4" x2="40" y2="76" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#4796E3"/><stop offset="45%" stop-color="#9177C7"/><stop offset="100%" stop-color="#CA6673"/></linearGradient></defs>
        <path d="M40 4C40 4 41.6 22 47 35C53 49 68 40 76 40C68 40 53 31 47 45C41.6 58 40 76 40 76C40 76 38.4 58 33 45C27 31 12 40 4 40C12 40 27 49 33 35C38.4 22 40 4 40 4Z" fill="url(#lg)"/>
      </svg>
      <span class="auth-brand-name">Sales Orbit</span>
    </div>

    <div class="auth-body">
      <div class="auth-title">Welcome back.</div>
      <div class="auth-sub">Sign in to keep your pipeline in motion.</div>

      <div class="error-msg" id="login-error"></div>

      <div class="auth-field">
        <label>Work email</label>
        <label class="auth-input">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
        </label>
      </div>

      <div class="auth-field">
        <label>Password</label>
        <label class="auth-input">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </label>
      </div>

      <button class="auth-cta" id="login-btn" onclick="doLogin()">Sign in to Sales Orbit</button>

      <div class="auth-foot">New channel partner? <a href="register.html">Create an account</a></div>
    </div>
  </div>
</div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script>
// Redirect if already logged in
const _u = Auth.getUser();
if (_u) {
  window.location.href = Auth.isInternal(_u) ? '/internal/dashboard.html' : '/partner/dashboard.html';
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('login-error');

  errEl.classList.remove('show');

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const result = await API.login({ email, password });
    Auth.setSession(result.token, result.user);
    window.location.href = Auth.isInternal(result.user)
      ? '/internal/dashboard.html'
      : '/partner/dashboard.html';
  } catch (err) {
    errEl.textContent = err.message || 'Login failed. Please try again.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign in to Sales Orbit';
  }
}
</script>
</body>
</html>
