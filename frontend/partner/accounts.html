<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My Accounts · Sales Orbit</title>
<link rel="stylesheet" href="../assets/css/design-system.css"/>
<style>
.acct-detail-panel{position:fixed;right:0;top:0;height:100vh;width:540px;background:var(--surface);border-left:1px solid var(--border2);z-index:150;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.2,.8,.2,1);overflow:hidden}
[data-theme=dark] .acct-detail-panel{box-shadow:-8px 0 32px rgba(0,0,0,.6)}
.acct-detail-panel.open{transform:translateX(0)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;transition:all .2s}
.panel-close:hover{background:var(--border2)}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);position:relative;margin:-20px -20px 20px;padding:0 20px}
.tab-btn{padding:10px 14px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:color .2s;position:relative;white-space:nowrap}
.tab-btn.active{color:var(--text)}
.tab-indicator{position:absolute;bottom:-1px;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--g-blue),var(--g-purple));transition:all .35s cubic-bezier(.2,.8,.2,1)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.info-item{display:flex;flex-direction:column;gap:4px}
.info-label{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text3)}
.info-value{font-size:13px;color:var(--text);font-weight:500}
.notes-list{display:flex;flex-direction:column;gap:12px}
.note-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px}
.note-author{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.note-content{font-size:13px;color:var(--text);line-height:1.55}
.note-input-row{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.note-textarea{flex:1;border:1px solid var(--border2);border-radius:10px;padding:10px 12px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);resize:none;outline:none;transition:border-color .2s}
.note-textarea:focus{border-color:var(--g-blue);box-shadow:0 0 0 3px var(--g-blue-soft)}
.audit-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.audit-item:last-child{border-bottom:none}
.audit-dot{width:8px;height:8px;border-radius:50%;background:var(--g-purple);flex-shrink:0;margin-top:4px}
.audit-body{flex:1}
.audit-action{font-size:12px;font-weight:500;color:var(--text)}
.audit-meta{font-size:11px;color:var(--text3);margin-top:2px}
.ticket-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.ticket-query{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.ticket-meta{font-size:11px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>

<div class="app-shell">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div id="topbar-placeholder"></div>
    <div class="page-body">

      <!-- Toolbar -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div class="search-box" style="min-width:240px">
          <svg style="width:15px;height:15px;color:var(--text3)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="search-input" placeholder="Search accounts…" oninput="debounceSearch()"/>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select id="filter-status" class="filter-select" onchange="loadAccounts()">
            <option value="">All Statuses</option>
            <option value="registered">Registered</option>
            <option value="in_review">In Review</option>
            <option value="onboarded">Onboarded</option>
            <option value="activated">Activated</option>
            <option value="rejected">Rejected</option>
          </select>
          <select id="filter-vertical" class="filter-select" onchange="loadAccounts()">
            <option value="">All Verticals</option>
            <option value="it_services_provider">IT Services</option>
            <option value="ecomm_seller">E-comm Seller</option>
            <option value="b2b_seller">B2B Seller</option>
            <option value="freelancer">Freelancer</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="triggerExport()">
            <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export XLS
          </button>
          <label class="btn btn-ghost btn-sm" style="cursor:pointer">
            <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Bulk Upload
            <input type="file" id="bulk-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="doBulkUpload(this)"/>
          </label>
          <button class="btn btn-grad btn-sm" onclick="openAddModal()">
            <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
            Add Account
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <div class="table-toolbar">
          <div class="table-toolbar-left">
            <span class="table-name">Accounts</span>
            <span class="table-count" id="tbl-count">0</span>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th>Company</th>
                <th>Contact</th>
                <th>Vertical</th>
                <th>Business Type</th>
                <th>Status</th>
                <th>Registered</th>
                <th style="text-align:center">Actions</th>
              </tr>
            </thead>
            <tbody id="accounts-tbody">
              <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
        <div class="table-foot">
          <span id="tbl-showing">Showing 0</span>
          <div class="pgr" id="pgr"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Detail Slide Panel -->
<div class="acct-detail-panel" id="detail-panel">
  <div class="panel-header">
    <div>
      <div style="font-size:15px;font-weight:600;color:var(--text)" id="panel-title">Account</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px" id="panel-sub"></div>
    </div>
    <button class="panel-close" onclick="closeDetailPanel()">×</button>
  </div>
  <div style="display:flex;border-bottom:1px solid var(--border);position:relative;padding:0 20px;flex-shrink:0">
    <button class="tab-btn active" data-tab="info"    onclick="switchTab('info')">Info</button>
    <button class="tab-btn"        data-tab="notes"   onclick="switchTab('notes')">Notes</button>
    <button class="tab-btn"        data-tab="tickets" onclick="switchTab('tickets')">Tickets</button>
    <button class="tab-btn"        data-tab="history" onclick="switchTab('history')">History</button>
    <span class="tab-indicator" id="tab-ind" style="width:38px;left:20px"></span>
  </div>
  <div class="panel-body">
    <div id="tab-info">
      <div class="info-grid" id="info-grid"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px" id="panel-actions"></div>
    </div>
    <div id="tab-notes" class="hidden">
      <div class="notes-list" id="notes-list"></div>
      <div class="note-input-row">
        <textarea class="note-textarea" id="note-input" rows="3" placeholder="Add a note…"></textarea>
        <button class="btn btn-grad" onclick="submitNote()" style="align-self:flex-end">Post</button>
      </div>
    </div>
    <div id="tab-tickets" class="hidden">
      <div id="tickets-list"></div>
      <button class="btn btn-grad w-full mt-16" onclick="openTicketModal(currentAccountId)">
        <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
        Create Ticket
      </button>
    </div>
    <div id="tab-history" class="hidden">
      <div id="audit-list"></div>
    </div>
  </div>
</div>

<!-- Add / Edit Account Modal -->
<div class="modal-overlay hidden" id="account-modal">
  <div class="modal-box" style="max-width:700px;width:95vw">
    <div class="modal-header">
      <div class="modal-icon">
        <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      </div>
      <div>
        <div class="modal-title" id="modal-title">Add Account</div>
        <div class="modal-sub" id="modal-sub">Fill in the account details below</div>
      </div>
      <button class="modal-close" onclick="closeAccountModal()">×</button>
    </div>
    <div class="modal-body" style="max-height:72vh;overflow-y:auto">
      <div id="modal-err" style="background:rgba(217,48,37,.1);color:#D93025;border:1px solid rgba(217,48,37,.2);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:14px;display:none"></div>

      <!-- Row 1: Client ID | Company Name -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Client ID</label>
          <input class="form-input" id="f-client-id" placeholder="Enter client ID"/>
        </div>
        <div class="form-group">
          <label class="form-label">Company Name *</label>
          <input class="form-input" id="f-company" placeholder="Write registered company name"/>
        </div>
      </div>

      <!-- Row 2: Company Reg Country | Director Name -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Company Reg Country</label>
          <select class="form-input" id="f-country" onchange="toggleCountryOther()">
            <option value="">Select country</option>
            <option value="United States">United States</option>
            <option value="United Kingdom">United Kingdom</option>
            <option value="United Arab Emirates">United Arab Emirates</option>
            <option value="Singapore">Singapore</option>
            <option value="Hong Kong">Hong Kong</option>
            <option value="Pakistan">Pakistan</option>
            <option value="__other__">Other (Type Manually)</option>
          </select>
          <input class="form-input" id="f-country-other" placeholder="Type country name…" style="margin-top:6px;display:none"/>
        </div>
        <div class="form-group">
          <label class="form-label">Director Name</label>
          <input class="form-input" id="f-contact-name" placeholder="Full name of director"/>
        </div>
      </div>

      <!-- Row 3: Email ID | Phone -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email ID *</label>
          <input class="form-input" type="email" id="f-contact-email" placeholder="director@company.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" id="f-phone" placeholder="Active Whatsapp Number of Client"/>
        </div>
      </div>

      <!-- Row 4: Website | Account Reg Date -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Website</label>
          <input class="form-input" id="f-website" placeholder="Website URL or Ecomm Store Link"/>
        </div>
        <div class="form-group">
          <label class="form-label">Account Reg Date</label>
          <input class="form-input" type="date" id="f-reg-date"/>
        </div>
      </div>

      <!-- Row 5: Business Type | Vertical -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Business Type</label>
          <select class="form-input" id="f-biz">
            <option value="">Select type</option>
            <option value="new">New</option>
            <option value="established">Established</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Vertical</label>
          <select class="form-input" id="f-vertical">
            <option value="">Select vertical</option>
            <option value="it_services_provider">IT Services</option>
            <option value="ecomm_seller">Ecomm Seller</option>
            <option value="b2b_seller">B2B Seller</option>
          </select>
        </div>
      </div>

      <!-- Nature of Business (full width) -->
      <div class="form-group">
        <label class="form-label">Nature of Business</label>
        <select class="form-input" id="f-nob">
          <option value="">Select nature of business</option>
          <option value="Ai Solutions">Ai Solutions</option>
          <option value="App Development">App Development</option>
          <option value="B2B Goods">B2B Goods</option>
          <option value="BPO">BPO</option>
          <option value="Digital Accountancy">Digital Accountancy</option>
          <option value="Digital Marketing Agency">Digital Marketing Agency</option>
          <option value="E-comm Marketplaces">E-comm Marketplaces</option>
          <option value="Game Development">Game Development</option>
          <option value="HR Management">HR Management</option>
          <option value="IT Services">IT Services</option>
          <option value="Logistics">Logistics</option>
          <option value="Medical Billing">Medical Billing</option>
          <option value="PayPal">PayPal</option>
          <option value="Shopify">Shopify</option>
          <option value="Software Development">Software Development</option>
          <option value="Stripe">Stripe</option>
          <option value="Web Development">Web Development</option>
        </select>
      </div>

      <!-- Channel Partner (full width, auto-filled) -->
      <div class="form-group">
        <label class="form-label">Channel Partner</label>
        <input class="form-input" id="f-partner-display" disabled style="opacity:.7;cursor:default"/>
      </div>

      <!-- Row 6: Onboarding Specialist | Account Status -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Onboarding Specialist</label>
          <select class="form-input" id="f-onboarding-specialist" onchange="toggleOSother()">
            <option value="">Select specialist</option>
            <option value="Anum Farooq">Anum Farooq</option>
            <option value="Muhammad Shoaib">Muhammad Shoaib</option>
            <option value="Khushbu Fatima">Khushbu Fatima</option>
            <option value="__other__">Other (Add manually)</option>
          </select>
          <input class="form-input" id="f-os-other" placeholder="Enter specialist name…" style="margin-top:6px;display:none"/>
        </div>
        <div class="form-group">
          <label class="form-label">Account Status</label>
          <select class="form-input" id="f-status">
            <option value="registered">Registered</option>
            <option value="in_review">In Review</option>
            <option value="onboarded">Onboarded</option>
            <option value="activated">Activated</option>
          </select>
        </div>
      </div>

      <!-- Row 7: VA Status | Card Status -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">VA Status</label>
          <select class="form-input" id="f-va-status">
            <option value="">—</option>
            <option value="applied">Applied</option>
            <option value="issued">Issued</option>
            <option value="activated">Activated</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Card Status</label>
          <select class="form-input" id="f-card-status">
            <option value="">—</option>
            <option value="required">Required</option>
            <option value="applied">Applied</option>
            <option value="issued">Issued</option>
          </select>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAccountModal()">Cancel</button>
      <button class="btn btn-grad" id="modal-submit-btn" onclick="submitAccount()">Save Account</button>
    </div>
  </div>
</div>

<!-- Create Ticket Modal -->
<div class="modal-overlay hidden" id="ticket-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-icon" style="background:linear-gradient(135deg,var(--g-purple),var(--g-pink))">
        <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/></svg>
      </div>
      <div>
        <div class="modal-title">Create Ticket</div>
        <div class="modal-sub" id="ticket-modal-sub">Raise a support query</div>
      </div>
      <button class="modal-close" onclick="closeTicketModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="ticket-err" style="background:rgba(217,48,37,.1);color:#D93025;border:1px solid rgba(217,48,37,.2);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:12px;display:none"></div>
      <div class="form-group">
        <label class="form-label">Query Type *</label>
        <select class="form-input" id="t-query">
          <option value="">Select query type</option>
          <option>Account Approval – Document Approval</option>
          <option>Account Approval – EDD Alert</option>
          <option>Account Approval – VA Issuance &amp; Approval</option>
          <option>Account Approval – Nature of Business Review</option>
          <option>Account Approval – Funds Flow Info for Receiving and Payout</option>
          <option>Payment Review – Incoming Payment</option>
          <option>Payment Declined</option>
          <option>Payout not received in Local Bank</option>
          <option>Product Activation – Pay by Link/Card</option>
          <option>Product Information – Checkout/ Additional Currency Account/ Currency Conversion</option>
          <option>Price Reduction Request</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Expected Resolution *</label>
        <select class="form-input" id="t-resolution">
          <option value="">Select timeline</option>
          <option>2 Business Days</option>
          <option>3 Business Days</option>
          <option>1 Business Week</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Remarks</label>
        <textarea class="form-input" id="t-remarks" rows="3" placeholder="Describe your issue in detail…" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeTicketModal()">Cancel</button>
      <button class="btn btn-grad" onclick="submitTicket()">Submit Ticket</button>
    </div>
  </div>
</div>

<!-- Notification Panel -->
<div class="notif-panel hidden" id="notif-panel">
  <div class="notif-panel-head">
    <span class="notif-panel-title">Notifications</span>
    <button class="btn btn-ghost btn-sm" id="mark-all-read" style="padding:4px 10px;font-size:11px">Mark all read</button>
  </div>
  <div class="notif-scroll" id="notif-scroll"><div class="notif-empty">Loading…</div></div>
</div>
<div class="toast-container"></div>

<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/layout.js"></script>
<script>
const user = Auth.requirePartnerAuth();
let currentPage = 1;
let currentAccountId = null;
let editingAccountId = null;
let searchTimer = null;

if (user) {
  document.getElementById('sidebar-placeholder').outerHTML = Layout.partnerSidebar('accounts', user);
  document.getElementById('topbar-placeholder').outerHTML  = Layout.topbar('My Accounts', 'Manage your submitted accounts', user);
  Notifications.initNotifications();
  loadAccounts();

  // Check URL param for opening account detail or add modal
  const params = new URLSearchParams(window.location.search);
  if (params.get('id')) openDetailPanel(params.get('id'));
  if (params.get('action') === 'new') openAddModal();
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; loadAccounts(); }, 350);
}

async function loadAccounts() {
  const status   = document.getElementById('filter-status').value;
  const vertical = document.getElementById('filter-vertical').value;
  const search   = document.getElementById('search-input').value.trim();

  const tbody = document.getElementById('accounts-tbody');
  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)">Loading…</td></tr>`;

  try {
    const params = { page: currentPage, limit: 20 };
    if (status)   params.status   = status;
    if (vertical) params.vertical = vertical;
    if (search)   params.search   = search;

    const data = await API.getAccounts(params);
    const accounts = data.data || [];
    const total = data.total || 0;

    document.getElementById('tbl-count').textContent = total;
    document.getElementById('tbl-showing').textContent = `Showing ${((currentPage-1)*20)+1}–${Math.min(currentPage*20, total)} of ${total}`;

    if (!accounts.length) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">No accounts found. <a href="#" onclick="openAddModal()" style="color:var(--g-blue)">Add your first account</a></td></tr>`;
      return;
    }

    tbody.innerHTML = accounts.map(a => `
      <tr onclick="openDetailPanel('${a.id}')">
        <td>
          <div class="td-primary">${esc(a.company_name)}</div>
          <div class="td-sub">${esc(a.trading_name || '—')}</div>
        </td>
        <td>
          <div class="td-primary">${esc(a.contact_name)}</div>
          <div class="td-sub">${esc(a.contact_email)}</div>
        </td>
        <td>${Auth.verticalLabel(a.vertical)}</td>
        <td>${Auth.businessTypeLabel(a.business_type)}</td>
        <td>${Auth.statusBadge(a.status)}</td>
        <td>${Auth.formatDate(a.registration_date)}</td>
        <td style="text-align:center">
          <div style="display:flex;gap:6px;justify-content:center" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-sm" onclick="openEditModal('${a.id}')">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--g-purple)" onclick="openTicketModal('${a.id}')">Ticket</button>
          </div>
        </td>
      </tr>
    `).join('');

    renderPagination(total, data.limit);
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:#D93025">Error loading accounts: ${esc(e.message)}</td></tr>`;
  }
}

function renderPagination(total, limit) {
  const pages = Math.ceil(total / limit);
  const pgr = document.getElementById('pgr');
  if (pages <= 1) { pgr.innerHTML = ''; return; }
  let html = `<button onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= Math.min(pages, 7); i++) {
    html += `<button class="${i===currentPage?'act':''}" onclick="changePage(${i})">${i}</button>`;
  }
  html += `<button onclick="changePage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
  pgr.innerHTML = html;
}

function changePage(p) { currentPage = p; loadAccounts(); }

// ── DETAIL PANEL ──
async function openDetailPanel(id) {
  currentAccountId = id;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  document.getElementById('tab-info').classList.remove('hidden');
  document.getElementById('tab-notes').classList.add('hidden');
  document.getElementById('tab-tickets').classList.add('hidden');
  document.getElementById('tab-history').classList.add('hidden');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'info'));

  try {
    const data = await API.getAccount(id);
    const a = data.data;
    document.getElementById('panel-title').textContent = a.company_name;
    document.getElementById('panel-sub').textContent   = `${Auth.verticalLabel(a.vertical)} · ${Auth.businessTypeLabel(a.business_type)}`;

    document.getElementById('info-grid').innerHTML = [
      ['Contact Name', a.contact_name],
      ['Contact Email', a.contact_email],
      ['Phone', a.contact_phone || '—'],
      ['Country', a.country || '—'],
      ['Trading Name', a.trading_name || '—'],
      ['Status', Auth.statusBadge(a.status)],
      ['Registered', Auth.formatDate(a.registration_date)],
      ['Account Owner', a.owner_name || 'Unassigned'],
    ].map(([l, v]) => `
      <div class="info-item">
        <div class="info-label">${l}</div>
        <div class="info-value">${v}</div>
      </div>`).join('');

    if (a.remarks) {
      document.getElementById('info-grid').innerHTML += `
        <div class="info-item" style="grid-column:1/-1">
          <div class="info-label">Remarks</div>
          <div class="info-value">${esc(a.remarks)}</div>
        </div>`;
    }

    document.getElementById('panel-actions').innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="openEditModal('${id}')">Edit Account</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--g-purple)" onclick="switchTab('tickets');openTicketModal('${id}')">Create Ticket</button>`;

    positionTabIndicator();
  } catch (e) {
    Auth.showToast('Could not load account details.', 'error');
  }
}

function closeDetailPanel() {
  document.getElementById('detail-panel').classList.remove('open');
  currentAccountId = null;
}

function switchTab(tab) {
  ['info','notes','tickets','history'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  positionTabIndicator();

  if (tab === 'notes')   loadNotes();
  if (tab === 'tickets') loadTickets();
  if (tab === 'history') loadAuditLog();
}

function positionTabIndicator() {
  const active = document.querySelector('.tab-btn.active');
  const ind    = document.getElementById('tab-ind');
  if (active && ind) {
    ind.style.width = active.offsetWidth + 'px';
    ind.style.left  = active.offsetLeft + 'px';
  }
}

async function loadNotes() {
  const list = document.getElementById('notes-list');
  list.innerHTML = '<div style="color:var(--text3);font-size:12px">Loading notes…</div>';
  try {
    const data = await API.getNotes(currentAccountId);
    const notes = data.data || [];
    if (!notes.length) { list.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">No notes yet. Add the first one below.</div>'; return; }
    list.innerHTML = notes.map(n => `
      <div class="note-item">
        <div class="note-author">
          <span>${esc(n.author_name)} <span style="font-weight:400;color:var(--text3)">(${Auth.roleLabel(n.author_role)})</span></span>
          <span style="color:var(--text3);font-weight:400">${Auth.timeAgo(n.created_at)}</span>
        </div>
        <div class="note-content">${esc(n.content)}</div>
      </div>`).join('');
  } catch { list.innerHTML = '<div style="color:#D93025;font-size:12px">Could not load notes.</div>'; }
}

async function submitNote() {
  const input = document.getElementById('note-input');
  const content = input.value.trim();
  if (!content) return;
  try {
    await API.createNote(currentAccountId, { content });
    input.value = '';
    loadNotes();
    Auth.showToast('Note posted.', 'success');
  } catch (e) { Auth.showToast(e.message, 'error'); }
}

async function loadTickets() {
  const list = document.getElementById('tickets-list');
  list.innerHTML = '<div style="color:var(--text3);font-size:12px">Loading…</div>';
  try {
    const data = await API.getTickets({ account_id: currentAccountId, limit: 20 });
    const tickets = data.data || [];
    if (!tickets.length) { list.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">No tickets for this account yet.</div>'; return; }
    list.innerHTML = tickets.map(t => `
      <div class="ticket-item">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:10px;font-weight:600;color:var(--text3)">#${t.ticket_number}</span>
          ${Auth.ticketStatusBadge(t.status)}
        </div>
        <div class="ticket-query">${esc(t.query_type)}</div>
        <div class="ticket-meta">
          <span>Resolution: ${esc(t.expected_resolution || '—')}</span>
          <span>Opened: ${Auth.formatDate(t.created_at)}</span>
          ${t.specialist_notes ? `<span style="width:100%;color:var(--text2)">${esc(t.specialist_notes)}</span>` : ''}
        </div>
      </div>`).join('');
  } catch { list.innerHTML = '<div style="color:#D93025;font-size:12px">Could not load tickets.</div>'; }
}

async function loadAuditLog() {
  const list = document.getElementById('audit-list');
  list.innerHTML = '<div style="color:var(--text3);font-size:12px">Loading…</div>';
  try {
    const data = await API.getAuditLog(currentAccountId);
    const logs = data.data || [];
    if (!logs.length) { list.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">No audit history yet.</div>'; return; }
    list.innerHTML = `<div class="audit-item" style="flex-direction:column;gap:0;padding:0;border:none">${logs.map(l => `
      <div class="audit-item">
        <div class="audit-dot"></div>
        <div class="audit-body">
          <div class="audit-action">${actionLabel(l.action)}</div>
          <div class="audit-meta">${esc(l.user_name || 'System')} · ${Auth.timeAgo(l.created_at)}</div>
        </div>
      </div>`).join('')}</div>`;
  } catch { list.innerHTML = '<div style="color:#D93025;font-size:12px">Could not load history.</div>'; }
}

function actionLabel(a) {
  const map = { account_created: 'Account created', account_updated: 'Account updated', note_added: 'Note added' };
  return map[a] || a;
}

// ── ADD / EDIT MODAL ──
function toggleCountryOther() {
  const sel = document.getElementById('f-country');
  const other = document.getElementById('f-country-other');
  other.style.display = sel.value === '__other__' ? 'block' : 'none';
  if (sel.value !== '__other__') other.value = '';
}

function toggleOSother() {
  const sel = document.getElementById('f-onboarding-specialist');
  const other = document.getElementById('f-os-other');
  other.style.display = sel.value === '__other__' ? 'block' : 'none';
  if (sel.value !== '__other__') other.value = '';
}

function getCountryValue() {
  const sel = document.getElementById('f-country');
  return sel.value === '__other__'
    ? document.getElementById('f-country-other').value.trim()
    : sel.value;
}

function setCountryValue(val) {
  const sel = document.getElementById('f-country');
  const known = ['United States','United Kingdom','United Arab Emirates','Singapore','Hong Kong','Pakistan'];
  if (!val) { sel.value = ''; }
  else if (known.includes(val)) { sel.value = val; }
  else {
    sel.value = '__other__';
    document.getElementById('f-country-other').value = val;
    document.getElementById('f-country-other').style.display = 'block';
  }
}

function getOSValue() {
  const sel = document.getElementById('f-onboarding-specialist');
  return sel.value === '__other__'
    ? document.getElementById('f-os-other').value.trim()
    : sel.value;
}

function setOSValue(val) {
  const sel = document.getElementById('f-onboarding-specialist');
  const known = ['Anum Farooq','Muhammad Shoaib','Khushbu Fatima'];
  if (!val) { sel.value = ''; }
  else if (known.includes(val)) { sel.value = val; }
  else {
    sel.value = '__other__';
    document.getElementById('f-os-other').value = val;
    document.getElementById('f-os-other').style.display = 'block';
  }
}

function openAddModal() {
  editingAccountId = null;
  document.getElementById('modal-title').textContent = 'Add Account';
  document.getElementById('modal-sub').textContent   = 'Fill in the account details';
  document.getElementById('f-client-id').value       = '';
  document.getElementById('f-company').value         = '';
  document.getElementById('f-contact-name').value    = '';
  document.getElementById('f-contact-email').value   = '';
  document.getElementById('f-phone').value           = '';
  document.getElementById('f-website').value         = '';
  document.getElementById('f-reg-date').value        = new Date().toISOString().split('T')[0];
  document.getElementById('f-biz').value             = '';
  document.getElementById('f-vertical').value        = '';
  document.getElementById('f-nob').value             = '';
  document.getElementById('f-partner-display').value = user.name || '';
  document.getElementById('f-status').value          = 'registered';
  document.getElementById('f-va-status').value       = '';
  document.getElementById('f-card-status').value     = '';
  setCountryValue('');
  setOSValue('');
  document.getElementById('modal-err').style.display = 'none';
  document.getElementById('account-modal').classList.remove('hidden');
}

async function openEditModal(id) {
  editingAccountId = id;
  document.getElementById('modal-title').textContent = 'Edit Account';
  document.getElementById('modal-sub').textContent   = 'Update account information';
  document.getElementById('modal-err').style.display = 'none';
  document.getElementById('account-modal').classList.remove('hidden');

  try {
    const data = await API.getAccount(id);
    const a = data.data;
    document.getElementById('f-client-id').value       = a.account_number || '—';
    document.getElementById('f-company').value         = a.company_name   || '';
    document.getElementById('f-contact-name').value    = a.contact_name   || '';
    document.getElementById('f-contact-email').value   = a.contact_email  || '';
    document.getElementById('f-phone').value           = a.contact_phone  || '';
    document.getElementById('f-website').value         = a.website        || '';
    document.getElementById('f-reg-date').value        = a.registration_date ? a.registration_date.split('T')[0] : '';
    document.getElementById('f-biz').value             = a.business_type  || '';
    document.getElementById('f-vertical').value        = a.vertical       || '';
    document.getElementById('f-nob').value             = a.nature_of_business || '';
    document.getElementById('f-partner-display').value = a.partner_name   || user.name || '';
    document.getElementById('f-status').value          = a.status         || 'registered';
    document.getElementById('f-va-status').value       = a.va_status      || '';
    document.getElementById('f-card-status').value     = a.card_status    || '';
    setCountryValue(a.country || '');
    setOSValue(a.onboarding_specialist || '');
  } catch (e) { Auth.showToast('Could not load account.', 'error'); }
}

function closeAccountModal() {
  document.getElementById('account-modal').classList.add('hidden');
  editingAccountId = null;
}

async function submitAccount() {
  const errEl = document.getElementById('modal-err');
  errEl.style.display = 'none';
  const btn = document.getElementById('modal-submit-btn');

  const body = {
    account_number:        document.getElementById('f-client-id').value.trim() || null,
    company_name:          document.getElementById('f-company').value.trim(),
    business_type:         document.getElementById('f-biz').value,
    vertical:              document.getElementById('f-vertical').value,
    contact_name:          document.getElementById('f-contact-name').value.trim(),
    contact_email:         document.getElementById('f-contact-email').value.trim(),
    contact_phone:         document.getElementById('f-phone').value.trim(),
    country:               getCountryValue(),
    website:               document.getElementById('f-website').value.trim(),
    nature_of_business:    document.getElementById('f-nob').value,
    onboarding_specialist: getOSValue(),
    status:                document.getElementById('f-status').value,
    va_status:             document.getElementById('f-va-status').value || null,
    card_status:           document.getElementById('f-card-status').value || null,
    registration_date:     document.getElementById('f-reg-date').value || null,
  };

  if (!body.company_name || !body.contact_email) {
    errEl.textContent = 'Company name and email are required.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    if (editingAccountId) {
      await API.updateAccount(editingAccountId, body);
      Auth.showToast('Account updated successfully.', 'success');
    } else {
      await API.createAccount(body);
      Auth.showToast('Account added successfully.', 'success');
    }
    closeAccountModal();
    loadAccounts();
  } catch (e) {
    errEl.textContent = e.message || 'Failed to save account.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Account';
  }
}

// ── TICKET MODAL ──
let ticketAccountId = null;

function openTicketModal(accountId) {
  ticketAccountId = accountId;
  document.getElementById('t-query').value      = '';
  document.getElementById('t-resolution').value = '';
  document.getElementById('t-remarks').value    = '';
  document.getElementById('ticket-err').style.display = 'none';
  document.getElementById('ticket-modal').classList.remove('hidden');
}

function closeTicketModal() {
  document.getElementById('ticket-modal').classList.add('hidden');
}

async function submitTicket() {
  const errEl = document.getElementById('ticket-err');
  errEl.style.display = 'none';
  const query      = document.getElementById('t-query').value;
  const resolution = document.getElementById('t-resolution').value;
  const remarks    = document.getElementById('t-remarks').value.trim();

  if (!query || !resolution) {
    errEl.textContent = 'Query type and expected resolution are required.';
    errEl.style.display = 'block';
    return;
  }

  try {
    await API.createTicket({ account_id: ticketAccountId, query_type: query, expected_resolution: resolution, remarks });
    Auth.showToast('Ticket submitted. Your specialist has been notified.', 'success');
    closeTicketModal();
    if (currentAccountId === ticketAccountId) loadTickets();
  } catch (e) {
    errEl.textContent = e.message || 'Failed to submit ticket.';
    errEl.style.display = 'block';
  }
}

// ── BULK UPLOAD ──
async function doBulkUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const result = await API.bulkUpload(fd);
    Auth.showToast(`Bulk upload: ${result.created} accounts created. ${result.errors?.length || 0} errors.`, result.errors?.length ? 'error' : 'success', 6000);
    loadAccounts();
  } catch (e) { Auth.showToast(e.message, 'error'); }
  input.value = '';
}

function triggerExport() {
  const status   = document.getElementById('filter-status').value;
  const vertical = document.getElementById('filter-vertical').value;
  const url = API.exportAccounts({ status, vertical });
  // Download with auth token via fetch
  fetch(url, { headers: { Authorization: `Bearer ${Auth.getToken()}` } })
    .then(r => r.blob())
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'accounts.xlsx';
      a.click();
    });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.addEventListener('load', positionTabIndicator);
</script>
