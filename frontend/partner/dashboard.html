<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Partner Dashboard · Sales Orbit</title>
<link rel="stylesheet" href="../assets/css/design-system.css"/>
<style>
/* ── One-line unified header bar ───────────────────────────────────────── */
.dash-header-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.dash-header-identity{min-width:0;flex-shrink:0}
.dash-header-name{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-header-sub{font-size:11px;color:var(--text3);margin-top:1px}
.partner-link-bar{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:7px 12px;transition:border-color .2s}
.partner-link-bar:focus-within{border-color:var(--light-blue);box-shadow:0 0 0 3px rgba(0,160,242,.10)}
.partner-link-input{flex:1;border:none;background:transparent;font-family:var(--font);font-size:12px;color:var(--text);outline:none;min-width:0}
.partner-link-input::placeholder{color:var(--text3)}
.partner-link-copy{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border2);background:var(--bg3);font-family:var(--font);font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .18s;display:flex;align-items:center;gap:5px;flex-shrink:0}
.partner-link-copy:hover{border-color:var(--light-blue);color:var(--light-blue)}
.dash-header-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
@media(max-width:640px){
  .dash-header-bar{flex-direction:column;align-items:stretch}
  .partner-link-bar{min-width:0}
}
.pipeline-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px}
[data-theme=dark] .pipeline-card{background:linear-gradient(180deg,#1d1d1d,#141414)}
.pipeline-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.pipeline-title{font-size:14px;font-weight:600;color:var(--text)}
.acct-row{display:flex;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .15s;position:relative}
.acct-row:last-child{border-bottom:none}
.acct-row:hover{background:var(--bg2)}
.acct-co{font-size:13px;font-weight:500;color:var(--text)}
.acct-meta{font-size:11px;color:var(--text3);margin-top:2px}
.acct-status{margin-left:auto;flex-shrink:0}
.activity-dot{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--g-blue),var(--g-purple))}
.date-chip{padding:4px 11px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-family:var(--font);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .18s;white-space:nowrap}
.date-chip:hover{border-color:var(--g-purple);color:var(--g-purple)}
.date-chip.active{background:linear-gradient(135deg,var(--g-blue),var(--g-purple));border-color:transparent;color:#fff}
.ticket-row{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.ticket-row:last-child{border-bottom:none}
.ticket-num{font-size:10px;font-weight:600;color:var(--text3);flex-shrink:0;width:36px}
.ticket-body{flex:1;min-width:0}
.ticket-query{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ticket-co{font-size:11px;color:var(--text3);margin-top:2px}
.ticket-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;padding:16px 18px}
.ticket-summary-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.ticket-summary-val{font-size:22px;font-weight:700;color:var(--text)}
.ticket-summary-lbl{font-size:10px;color:var(--text3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>

<div class="app-shell">
  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <div id="topbar-placeholder"></div>

    <div class="page-body">

      <!-- Single unified header bar: partner link · actions -->
      <div class="dash-header-bar">
        <!-- Partner Link stretches to fill all space -->
        <div class="partner-link-bar">
          <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#00A0F2,#00DBBE);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </div>
          <span style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;flex-shrink:0">Partner Link</span>
          <input id="partner-link-input" type="url"
            placeholder="https://your-referral-link.com"
            class="partner-link-input"
            onfocus="this.style.borderColor='var(--light-blue)'"
            onblur="this.style.borderColor='var(--border2)'"
            oninput="savePartnerLink(this.value)"/>
          <button onclick="copyPartnerLink()" class="partner-link-copy" id="copy-link-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>

        <!-- Right: action buttons -->
        <div class="dash-header-actions">
          <a href="accounts.html?action=new" class="btn btn-grad btn-sm">
            <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
            Add Account
          </a>
          <a href="accounts.html" class="btn btn-ghost btn-sm">All Accounts</a>
        </div>
      </div>
      <!-- Filters -->
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <select class="filter-select" id="period-filter" onchange="handlePeriodSelect(this.value)">
            <option value="">All Time</option>
            <option value="current_week">This Week</option>
            <option value="last_week">Last Week</option>
            <option value="current_month">This Month</option>
            <option value="last_month">Last Month</option>
            <option value="current_quarter">This Quarter</option>
            <option value="prev_quarter">Prev Quarter</option>
            <option value="next_quarter">Next Quarter</option>
            <option value="ytd">Year to Date</option>
            <option value="custom">Custom Range…</option>
          </select>
          <span id="custom-date-wrap" style="display:none;align-items:center;gap:4px">
            <input type="date" id="custom-start" class="filter-select" style="padding:3px 8px;font-size:11px;width:120px" onchange="applyCustomDate()"/>
            <span style="color:var(--text3);font-size:11px">–</span>
            <input type="date" id="custom-end" class="filter-select" style="padding:3px 8px;font-size:11px;width:120px" onchange="applyCustomDate()"/>
          </span>
          <button id="dc-clear" onclick="clearDateFilter()" style="display:none;background:none;border:none;cursor:pointer;font-size:11px;color:var(--g-pink);padding:2px 6px">✕ Clear</button>
        <select id="dash-stage" class="filter-select" onchange="loadDashboard()">
          <option value="">All Stages</option>
          <option value="registered">Registered</option>
          <option value="in_review">In Review</option>
          <option value="onboarded">Onboarded</option>
          <option value="activated">Activated</option>
          <option value="rejected">Rejected</option>
        </select>
        <select id="dash-vertical" class="filter-select" onchange="loadDashboard()">
          <option value="">All Verticals</option>
          <option value="it_services_provider">IT Services</option>
          <option value="ecomm_seller">E-comm Seller</option>
          <option value="b2b_seller">B2B Goods Exports</option>
          <option value="freelancer">Freelancer</option>
        </select>
        <select id="dash-nob" class="filter-select" onchange="loadDashboard()">
          <option value="">All NOB</option>
          <option value="Ai Solutions">Ai Solutions</option>
          <option value="App Development">App Development</option>
          <option value="B2B Goods">B2B Goods</option>
          <option value="BPO">BPO</option>
          <option value="Digital Accountancy">Digital Accountancy</option>
          <option value="Digital Marketing Agency">Digital Marketing Agency</option>
          <option value="E-comm Marketplaces">E-comm Marketplaces</option>
          <option value="Game Development">Game Development</option>
          <option value="HR Management">HR Management</option>
          <option value="IT Services">IT Services</option>
          <option value="Logistics">Logistics</option>
          <option value="Medical Billing">Medical Billing</option>
          <option value="PayPal">PayPal</option>
          <option value="Shopify">Shopify</option>
          <option value="Software Development">Software Development</option>
          <option value="Stripe">Stripe</option>
          <option value="Web Development">Web Development</option>
        </select>
        <select id="dash-biz" class="filter-select" onchange="loadDashboard()">
          <option value="">All Biz Types</option>
          <option value="new">New</option>
          <option value="established">Established</option>
        </select>
      </div>

      <!-- Stats (no Open Tickets box) -->
      <div class="stats-grid" id="stats-grid" style="margin-bottom:20px">
        <div class="stat-card">
          <div class="lbl">Total Registered Accounts</div>
          <div class="val" id="stat-total">—</div>
          <div class="stat-card-accent" style="background:linear-gradient(90deg,var(--g-blue),var(--g-purple))"></div>
        </div>
        <div class="stat-card">
          <div class="lbl">In Review</div>
          <div class="val" style="color:var(--g-blue)" id="stat-review">—</div>
          <div class="stat-card-accent" style="background:var(--g-blue)"></div>
        </div>
        <div class="stat-card">
          <div class="lbl">Onboarded</div>
          <div class="val" style="color:var(--g-purple)" id="stat-onboarded">—</div>
          <div class="stat-card-accent" style="background:var(--g-purple)"></div>
        </div>
        <div class="stat-card">
          <div class="lbl">Activated</div>
          <div class="val" style="color:var(--g-green)" id="stat-activated">—</div>
          <div class="stat-card-accent" style="background:var(--g-green)"></div>
        </div>
      </div>

      <!-- Tickets Section -->
      <div class="pipeline-card">
        <div class="pipeline-head">
          <span class="pipeline-title">Ticket Overview</span>
          <a href="accounts.html" class="btn btn-ghost btn-sm">View Accounts</a>
        </div>
        <!-- Summary -->
        <div class="ticket-summary-grid" id="ticket-summary"></div>
        <!-- Open Tickets -->
        <div style="padding:10px 18px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-top:1px solid var(--border)">Open Tickets</div>
        <div id="open-tickets-list">
          <div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Loading…</div>
        </div>
        <!-- Past Tickets -->
        <div style="padding:10px 18px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-top:1px solid var(--border)">Resolved / Declined</div>
        <div id="closed-tickets-list">
          <div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Loading…</div>
        </div>
      </div>

      <!-- Recent Updates -->
      <div class="pipeline-card">
        <div class="pipeline-head">
          <span class="pipeline-title">Recent Updates</span>
          <a href="accounts.html" class="btn btn-ghost btn-sm">View all</a>
        </div>
        <div id="recent-accounts">
          <div style="padding:32px;text-align:center;color:var(--text3);font-size:13px">Loading…</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Notification Panel -->
<div class="notif-panel hidden" id="notif-panel">
  <div class="notif-panel-head">
    <span class="notif-panel-title">Notifications</span>
    <button class="btn btn-ghost btn-sm" id="mark-all-read" style="padding:4px 10px;font-size:11px">Mark all read</button>
  </div>
  <div class="notif-scroll" id="notif-scroll"><div class="notif-empty">Loading…</div></div>
</div>

<div class="toast-container"></div>

<script src="../assets/js/auth.js?v=3"></script>
<script src="../assets/js/api.js?v=3"></script>
<script src="../assets/js/notifications.js?v=3"></script>
<script src="../assets/js/layout.js?v=3"></script>
<script>
const user = Auth.requirePartnerAuth();
if (user) {
  document.getElementById('sidebar-placeholder').outerHTML = Layout.partnerSidebar('dashboard', user);
  document.getElementById('topbar-placeholder').outerHTML  = Layout.topbar('Partner Dashboard', `Welcome back, ${user.company_name || user.name.split(' ')[0]}`, user);
  const wh = document.getElementById('welcome-heading');
  if (wh) wh.textContent = user.company_name || user.name;
  // Restore saved partner link
  const saved = localStorage.getItem(`partner_link_${user.id}`);
  if (saved) document.getElementById('partner-link-input').value = saved;
  Notifications.initNotifications();
  loadDashboard();
}

let activeDateFilter = { key: null, start: null, end: null };

function getDateRange(key) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const dayOfWeek = now.getDay();
  const monday = new Date(now); monday.setDate(now.getDate() - ((dayOfWeek + 6) % 7));
  const fmt = d => d.toISOString().split('T')[0];
  switch (key) {
    case 'current_week': { const sun=new Date(monday); sun.setDate(monday.getDate()+6); return [fmt(monday),fmt(sun)]; }
    case 'last_week':    { const lm=new Date(monday); lm.setDate(monday.getDate()-7); const ls=new Date(lm); ls.setDate(lm.getDate()+6); return [fmt(lm),fmt(ls)]; }
    case 'current_month':  return [fmt(new Date(y,m,1)), fmt(new Date(y,m+1,0))];
    case 'last_month':     return [fmt(new Date(y,m-1,1)), fmt(new Date(y,m,0))];
    case 'current_quarter':{ const q=Math.floor(m/3); return [fmt(new Date(y,q*3,1)),fmt(new Date(y,q*3+3,0))]; }
    case 'prev_quarter':   { const q=Math.floor(m/3)-1,qy=q<0?y-1:y,qq=q<0?3:q; return [fmt(new Date(qy,qq*3,1)),fmt(new Date(qy,qq*3+3,0))]; }
    case 'next_quarter':   { const q=Math.floor(m/3)+1,qy=q>3?y+1:y,qq=q>3?0:q; return [fmt(new Date(qy,qq*3,1)),fmt(new Date(qy,qq*3+3,0))]; }
    case 'ytd': return [fmt(new Date(y,0,1)),fmt(now)];
    default: return [null,null];
  }
}

function handlePeriodSelect(val) {
  document.getElementById('custom-date-wrap').style.display = 'none';
  document.getElementById('dc-clear').style.display = 'none';
  if (!val) { clearDateFilter(); return; }
  if (val === 'custom') {
    document.getElementById('custom-date-wrap').style.display = 'flex';
    document.getElementById('dc-clear').style.display = 'inline-block';
    return;
  }
  const [start, end] = getDateRange(val);
  activeDateFilter = { key: val, start, end };
  document.getElementById('dc-clear').style.display = 'inline-block';
  loadDashboard();
}
function applyCustomDate() {
  const s = document.getElementById('custom-start').value, e = document.getElementById('custom-end').value;
  if (s && e) { activeDateFilter = { key:'custom', start:s, end:e }; loadDashboard(); }
}
function clearDateFilter() {
  activeDateFilter = { key:null, start:null, end:null };
  const pf = document.getElementById('period-filter');
  if (pf) pf.value = '';
  document.getElementById('custom-date-wrap').style.display = 'none';
  document.getElementById('dc-clear').style.display = 'none';
  document.getElementById('custom-start').value = '';
  document.getElementById('custom-end').value = '';
  loadDashboard();
}

async function loadDashboard() {
  const stage    = document.getElementById('dash-stage').value;
  const vertical = document.getElementById('dash-vertical').value;
  const nob      = document.getElementById('dash-nob').value;
  const biz      = document.getElementById('dash-biz').value;

  const acctParams = { limit: 999 };
  if (stage)    acctParams.status            = stage;
  if (vertical) acctParams.vertical          = vertical;
  if (nob)      acctParams.nature_of_business = nob;
  if (biz)      acctParams.business_type     = biz;
  if (activeDateFilter.start) acctParams.start_date = activeDateFilter.start;
  if (activeDateFilter.end)   acctParams.end_date   = activeDateFilter.end;

  try {
    const [acctData, ticketData] = await Promise.all([
      API.getAccounts(acctParams),
      API.getTickets({ limit: 100 })
    ]);

    const all     = acctData.data || [];
    const tickets = ticketData.data || [];

    // Stats
    document.getElementById('stat-total').textContent     = acctData.total || 0;
    document.getElementById('stat-review').textContent    = all.filter(a=>a.status==='in_review').length;
    document.getElementById('stat-onboarded').textContent = all.filter(a=>a.status==='onboarded').length;
    document.getElementById('stat-activated').textContent = all.filter(a=>a.status==='activated').length;

    // Ticket summary
    const tOpen    = tickets.filter(t=>t.status==='open').length;
    const tReview  = tickets.filter(t=>t.status==='in_review').length;
    const tPendP   = tickets.filter(t=>t.status==='pending_partner').length;
    const tPendC   = tickets.filter(t=>t.status==='pending_customer').length;
    const tResolved= tickets.filter(t=>t.status==='resolved').length;
    const tDeclined= tickets.filter(t=>t.status==='declined').length;
    document.getElementById('ticket-summary').innerHTML = [
      [tOpen,'Open','var(--g-blue)'],
      [tReview,'In Review','var(--g-purple)'],
      [tPendP,'Pending Partner','var(--g-pink)'],
      [tPendC,'Pending Client','#F59E0B'],
      [tResolved,'Resolved','var(--g-green)'],
      [tDeclined,'Declined','#D93025'],
    ].map(([v,l,c])=>`<div class="ticket-summary-box">
      <div class="ticket-summary-val" style="color:${c}">${v}</div>
      <div class="ticket-summary-lbl">${l}</div>
    </div>`).join('');

    // Open tickets list
    const openTickets = tickets.filter(t=>!['resolved','declined'].includes(t.status));
    document.getElementById('open-tickets-list').innerHTML = openTickets.length
      ? openTickets.map(t=>`
        <div class="ticket-row">
          <div class="ticket-num">#${t.ticket_number}</div>
          <div class="ticket-body">
            <div class="ticket-query">${esc(t.query_type)}</div>
            <div class="ticket-co">${esc(t.account_company_name||t.account_name||'—')} · ${Auth.timeAgo(t.created_at)}</div>
          </div>
          <div>${Auth.ticketStatusBadge(t.status)}</div>
        </div>`).join('')
      : '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">No open tickets</div>';

    // Closed tickets list
    const closedTickets = tickets.filter(t=>['resolved','declined'].includes(t.status)).slice(0,10);
    document.getElementById('closed-tickets-list').innerHTML = closedTickets.length
      ? closedTickets.map(t=>`
        <div class="ticket-row" style="opacity:.7">
          <div class="ticket-num">#${t.ticket_number}</div>
          <div class="ticket-body">
            <div class="ticket-query">${esc(t.query_type)}</div>
            <div class="ticket-co">${esc(t.account_company_name||t.account_name||'—')} · ${Auth.formatDate(t.resolved_at||t.updated_at)}</div>
          </div>
          <div>${Auth.ticketStatusBadge(t.status)}</div>
        </div>`).join('')
      : '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">No resolved tickets yet</div>';

    // Recent Updates — order by most recently updated, show activity badge
    const recent = [...all].sort((a,b)=>new Date(b.updated_at||b.registration_date)-new Date(a.updated_at||a.registration_date)).slice(0,8);
    renderRecentAccounts(recent);

  } catch (e) {
    Auth.showToast('Could not load dashboard data.', 'error');
  }
}

function renderRecentAccounts(accounts) {
  const container = document.getElementById('recent-accounts');
  if (!accounts.length) {
    container.innerHTML = `
      <div style="padding:40px;text-align:center">
        <div style="font-size:13px;color:var(--text3);margin-bottom:14px">No accounts yet. Add your first account to get started.</div>
        <a href="accounts.html?action=new" class="btn btn-grad">Add Account</a>
      </div>`;
    return;
  }

  const now = Date.now();
  container.innerHTML = accounts.map(a => {
    const hasNotes   = parseInt(a.notes_count) > 0;
    const hasTickets = parseInt(a.open_tickets) > 0;
    const updatedMs  = new Date(a.updated_at || a.registration_date).getTime();
    const isRecent   = (now - updatedMs) < 7 * 24 * 60 * 60 * 1000; // within 7 days
    const showBadge  = isRecent && (hasNotes || hasTickets || a.updated_at !== a.created_at);
    return `
    <div class="acct-row" onclick="window.location.href='accounts.html?id=${a.id}'">
      ${showBadge ? '<span class="activity-dot"></span>' : ''}
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--g-blue-soft),var(--g-purple-soft));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;color:var(--g-purple);margin-left:${showBadge?'10':'0'}px">
        ${(a.company_name||'?')[0].toUpperCase()}
      </div>
      <div style="flex:1;min-width:0">
        <div class="acct-co">${esc(a.company_name)}</div>
        <div class="acct-meta">
          ${Auth.verticalLabel(a.vertical)} · ${Auth.businessTypeLabel(a.business_type)}
          ${showBadge ? `<span style="color:var(--g-blue);font-weight:600;margin-left:4px">· Updated ${Auth.timeAgo(a.updated_at)}</span>` : `· ${Auth.formatDate(a.registration_date)}`}
        </div>
      </div>
      <div class="acct-status">${Auth.statusBadge(a.status)}</div>
      ${hasTickets ? `<span class="badge badge-pink" style="margin-left:6px">${a.open_tickets} ticket${a.open_tickets>1?'s':''}</span>` : ''}
    </div>`;
  }).join('');
}

function savePartnerLink(val) {
  if (user) localStorage.setItem(`partner_link_${user.id}`, val);
}
function copyPartnerLink() {
  const v = document.getElementById('partner-link-input').value.trim();
  if (!v) { Auth.showToast('Please enter a link first.', 'error'); return; }
  navigator.clipboard.writeText(v).then(() => {
    const btn = document.getElementById('copy-link-btn');
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Copied!`;
    btn.style.color = 'var(--teal-green)'; btn.style.borderColor = 'var(--teal-green)';
    setTimeout(() => {
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      btn.style.color = 'var(--text2)'; btn.style.borderColor = 'var(--border2)';
    }, 2000);
  }).catch(() => Auth.showToast('Copy failed — please copy manually.', 'error'));
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
