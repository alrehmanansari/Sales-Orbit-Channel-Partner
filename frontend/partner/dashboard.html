<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Partner Dashboard · Sales Orbit</title>
<link rel="stylesheet" href="../assets/css/design-system.css"/>
<style>
.welcome-card{background:linear-gradient(135deg,rgba(71,150,227,.12),rgba(145,119,199,.12));border:1px solid var(--g-purple-soft);border-radius:20px;padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:20px;position:relative;overflow:hidden}
[data-theme=dark] .welcome-card{background:linear-gradient(135deg,rgba(71,150,227,.18),rgba(145,119,199,.18))}
.welcome-card::before{content:'';position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(145,119,199,.25),transparent 70%)}
.welcome-h{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.3px;margin-bottom:4px}
.welcome-sub{font-size:13px;color:var(--text2)}
.pipeline-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px}
[data-theme=dark] .pipeline-card{background:linear-gradient(180deg,#1d1d1d,#141414)}
.pipeline-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.pipeline-title{font-size:14px;font-weight:600;color:var(--text)}
.acct-row{display:flex;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .15s}
.acct-row:last-child{border-bottom:none}
.acct-row:hover{background:var(--bg2)}
.acct-co{font-size:13px;font-weight:500;color:var(--text)}
.acct-meta{font-size:11px;color:var(--text3);margin-top:2px}
.acct-status{margin-left:auto;flex-shrink:0}
</style>
</head>
<body>

<div class="app-shell">
  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <div id="topbar-placeholder"></div>

    <div class="page-body">

      <!-- Welcome Banner -->
      <div class="welcome-card">
        <div style="position:relative;z-index:1">
          <div class="welcome-h" id="welcome-heading">Good day!</div>
          <div class="welcome-sub">Track your accounts, submit new businesses, and stay updated.</div>
        </div>
        <div style="display:flex;gap:8px;position:relative;z-index:1;flex-wrap:wrap">
          <a href="accounts.html?action=new" class="btn btn-grad">
            <svg style="width:15px;height:15px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
            Add Account
          </a>
          <a href="accounts.html" class="btn btn-ghost">View All Accounts</a>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="lbl">Total Accounts</div>
          <div class="val" id="stat-total">—</div>
          <div class="stat-card-accent" style="background:linear-gradient(90deg,var(--g-blue),var(--g-purple))"></div>
        </div>
        <div class="stat-card">
          <div class="lbl">In Review</div>
          <div class="val" style="color:var(--g-blue)" id="stat-review">—</div>
          <div class="stat-card-accent" style="background:var(--g-blue)"></div>
        </div>
        <div class="stat-card">
          <div class="lbl">Onboarded</div>
          <div class="val" style="color:var(--g-purple)" id="stat-onboarded">—</div>
          <div class="stat-card-accent" style="background:var(--g-purple)"></div>
        </div>
        <div class="stat-card">
          <div class="lbl">Activated</div>
          <div class="val" style="color:var(--g-green)" id="stat-activated">—</div>
          <div class="stat-card-accent" style="background:var(--g-green)"></div>
        </div>
        <div class="stat-card">
          <div class="lbl">Open Tickets</div>
          <div class="val" style="color:var(--g-pink)" id="stat-tickets">—</div>
          <div class="stat-card-accent" style="background:var(--g-pink)"></div>
        </div>
      </div>

      <!-- Recent Accounts -->
      <div class="pipeline-card">
        <div class="pipeline-head">
          <span class="pipeline-title">Recent Accounts</span>
          <a href="accounts.html" class="btn btn-ghost btn-sm">View all</a>
        </div>
        <div id="recent-accounts">
          <div style="padding:32px;text-align:center;color:var(--text3);font-size:13px">Loading…</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Notification Panel -->
<div class="notif-panel hidden" id="notif-panel">
  <div class="notif-panel-head">
    <span class="notif-panel-title">Notifications</span>
    <button class="btn btn-ghost btn-sm" id="mark-all-read" style="padding:4px 10px;font-size:11px">Mark all read</button>
  </div>
  <div class="notif-scroll" id="notif-scroll"><div class="notif-empty">Loading…</div></div>
</div>

<div class="toast-container"></div>

<script src="../assets/js/auth.js?v=3"></script>
<script src="../assets/js/api.js?v=3"></script>
<script src="../assets/js/notifications.js?v=3"></script>
<script src="../assets/js/layout.js?v=3"></script>
<script>
const user = Auth.requirePartnerAuth();
if (user) {
  // Render sidebar + topbar
  document.getElementById('sidebar-placeholder').outerHTML = Layout.partnerSidebar('dashboard', user);
  document.getElementById('topbar-placeholder').outerHTML  = Layout.topbar('Partner Dashboard', `Welcome back, ${user.name.split(' ')[0]}`, user);

  document.getElementById('welcome-heading').textContent = `Good day, ${user.name.split(' ')[0]}!`;

  Notifications.initNotifications();
  loadDashboard();
}

async function loadDashboard() {
  try {
    const [accts, tickets] = await Promise.all([
      API.getAccounts({ limit: 5 }),
      API.getTickets({ limit: 1 })
    ]);

    const accounts = accts.data || [];
    const allAccts = accts.total || 0;

    // Quick stats from accounts list
    const reviewCount    = accounts.filter(a => a.status === 'in_review').length;
    const onboardedCount = accounts.filter(a => a.status === 'onboarded').length;
    const activatedCount = accounts.filter(a => a.status === 'activated').length;

    // For accurate counts, fetch full list
    const allData = await API.getAccounts({ limit: 999 });
    const all = allData.data || [];
    document.getElementById('stat-total').textContent     = allData.total || 0;
    document.getElementById('stat-review').textContent    = all.filter(a => a.status === 'in_review').length;
    document.getElementById('stat-onboarded').textContent = all.filter(a => a.status === 'onboarded').length;
    document.getElementById('stat-activated').textContent = all.filter(a => a.status === 'activated').length;
    document.getElementById('stat-tickets').textContent   = tickets.total || 0;

    renderRecentAccounts(accounts.slice(0, 8));
  } catch (e) {
    Auth.showToast('Could not load dashboard data.', 'error');
  }
}

function renderRecentAccounts(accounts) {
  const container = document.getElementById('recent-accounts');
  if (!accounts.length) {
    container.innerHTML = `
      <div style="padding:40px;text-align:center">
        <div style="font-size:13px;color:var(--text3);margin-bottom:14px">No accounts yet. Add your first account to get started.</div>
        <a href="accounts.html?action=new" class="btn btn-grad">Add Account</a>
      </div>`;
    return;
  }

  container.innerHTML = accounts.map(a => `
    <div class="acct-row" onclick="window.location.href='accounts.html?id=${a.id}'">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--g-blue-soft),var(--g-purple-soft));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;color:var(--g-purple)">
        ${(a.company_name||'?')[0].toUpperCase()}
      </div>
      <div style="flex:1;min-width:0">
        <div class="acct-co">${esc(a.company_name)}</div>
        <div class="acct-meta">${Auth.verticalLabel(a.vertical)} · ${Auth.businessTypeLabel(a.business_type)} · ${Auth.formatDate(a.registration_date)}</div>
      </div>
      <div class="acct-status">${Auth.statusBadge(a.status)}</div>
      ${parseInt(a.open_tickets) > 0 ? `<span class="badge badge-pink" style="margin-left:6px">${a.open_tickets} ticket${a.open_tickets > 1 ? 's' : ''}</span>` : ''}
    </div>
  `).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
