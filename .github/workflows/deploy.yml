name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.SERVER_PATH }}

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Fixing PORT in .env if wrong ==="
            if grep -q "^PORT=3000" backend/.env 2>/dev/null; then
              sed -i "s/^PORT=3000/PORT=3002/" backend/.env
              echo "Fixed PORT 3000 -> 3002"
            fi

            echo "=== Installing dependencies ==="
            cd backend && npm install --omit=dev && cd ..

            echo "=== Restarting backend ==="
            if pm2 list | grep -q "sales-orbit-api"; then
              pm2 restart sales-orbit-api --update-env
            else
              pm2 start backend/ecosystem.config.js --env production
              pm2 save
            fi

            echo "=== Reloading nginx ==="
            sudo nginx -t && sudo nginx -s reload

            echo "=== Health check ==="
            sleep 4
            curl -sf https://partner.salesorbit.tech/health && echo " BACKEND OK" || echo " BACKEND DOWN"
